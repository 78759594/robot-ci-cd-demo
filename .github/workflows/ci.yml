name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Database Migrations
        run: |
          curl -L https://repo1.maven.org/maven2/org/flywaydb/flyway-commandline/9.16.0/flyway-commandline-9.16.0-linux-x64.tar.gz | tar xvz
          ./flyway-9.16.0/flyway migrate -configFiles=flyway.conf

      - name: Run Robot Framework tests
        run: |
          robot tests/login.robot

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: robot-results
          path: output.xml
